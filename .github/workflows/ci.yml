name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout TCP20x4
        uses: actions/checkout@v4

      - name: Build and run host tests
        run: make clean test

  arduino-compile:
    runs-on: ubuntu-latest
    needs:
      - host-tests

    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - arduino:avr:uno
          - arduino:renesas_uno:minima
          - arduino:renesas_uno:unor4wifi

    steps:
      - name: Checkout TCP20x4
        uses: actions/checkout@v4
        with:
          path: TCP20x4

      - name: Checkout TCP1819
        uses: actions/checkout@v4
        with:
          repository: egp/TCP1819
          path: TCP1819

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: 1.x

      - name: Show Arduino CLI version
        run: arduino-cli version

      - name: Initialize Arduino CLI config
        run: arduino-cli config init --overwrite

      - name: Update index
        run: arduino-cli core update-index

      - name: Install AVR core
        run: arduino-cli core install arduino:avr

      - name: Install Renesas Uno core
        run: arduino-cli core install arduino:renesas_uno

      - name: Compile HardwareSmoke
        working-directory: TCP20x4
        run: |
          set -euo pipefail
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --warnings all \
            --library . \
            --library "$GITHUB_WORKSPACE/TCP1819" \
            examples/HardwareSmoke