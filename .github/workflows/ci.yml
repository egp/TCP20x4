name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TCP20x4
        uses: actions/checkout@v4

      - name: Build and run host tests
        run: make clean test

  arduino-compile:
    runs-on: ubuntu-latest
    needs:
      - host-tests
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - arduino:avr:uno

    steps:
      - name: Checkout TCP20x4
        uses: actions/checkout@v4
        with:
          path: TCP20x4

      - name: Checkout TCP1819
        uses: actions/checkout@v4
        with:
          repository: egp/TCP1819
          path: TCP1819

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Update index
        run: arduino-cli core update-index

      - name: Install AVR core
        run: arduino-cli core install arduino:avr

      - name: Compile HardwareSmoke
        working-directory: TCP20x4
        run: |
          set -euo pipefail
          arduino-cli compile \
            --fqbn "${{ matrix.fqbn }}" \
            --library . \
            --library "$GITHUB_WORKSPACE/TCP1819" \
            examples/HardwareSmoke